<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WorkStart - Gain Experience</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f8;
color:#333;
}

header{
background:#3498db;
color:white;
padding:20px;
text-align:center;
}

.hero{
background:#2980b9;
color:white;
padding:60px 20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

label{
display:block;
margin:10px 0 5px;
font-weight:bold;
}

select,button{
width:100%;
padding:12px;
border-radius:5px;
border:1px solid #ccc;
margin-bottom:15px;
font-size:15px;
}

button{
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.loading{
color:#777;
font-style:italic;
}

footer{
text-align:center;
padding:20px;
background:#eee;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>WORKSTART</h1>
<p>Gain Experience. Start Your Career.</p>
</header>

<section class="hero">
<h2>Explore Opportunities</h2>
<p>Find projects, internships, and opportunities to build real-world experience.</p>
</section>

<section class="container">

<h2>Search Opportunities</h2>

<label>Career Field</label>
<select id="career">
<option>Technology</option>
<option>Marketing</option>
<option>Data Analysis</option>
<option>Design</option>
</select>

<label>State</label>
<select id="state">
<option value="">Select State</option>
</select>

<label>City</label>
<select id="city">
<option value="">Select City</option>
</select>

<label>Experience Level</label>
<select id="experience">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>

<button id="find-btn">Find Opportunities</button>

</section>

<footer>
<p>© 2026 WorkStart</p>
</footer>

<script>

const states = {
"Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR",
"California":"CA","Colorado":"CO","Connecticut":"CT","Delaware":"DE",
"Florida":"FL","Georgia":"GA","Hawaii":"HI","Idaho":"ID",
"Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS",
"Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD",
"Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS",
"Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV",
"New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY",
"North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK",
"Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC",
"South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT",
"Vermont":"VT","Virginia":"VA","Washington":"WA","West Virginia":"WV",
"Wisconsin":"WI","Wyoming":"WY"
};

const stateSelect = document.getElementById("state");
const citySelect = document.getElementById("city");

let userLat = null;
let userLon = null;

// populate states
Object.keys(states).forEach(name=>{
let option=document.createElement("option");
option.value=states[name];
option.textContent=name;
stateSelect.appendChild(option);
});

// distance calculation
function distance(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

}

// load cities from backend
async function loadCities(state){

citySelect.innerHTML="<option>Loading cities...</option>";

try{

const res=await fetch(`/cities/${state}`);
const json=await res.json();

let cities=json.data || [];

if(userLat!==null){

cities.sort((a,b)=>{

const da=distance(userLat,userLon,a.latitude,a.longitude);
const db=distance(userLat,userLon,b.latitude,b.longitude);

return da-db;

});

}

const uniqueCities=[...new Set(cities.map(c=>c.city))];

citySelect.innerHTML='<option value="">Select City</option>';

uniqueCities.forEach(city=>{

let option=document.createElement("option");

option.value=city;
option.textContent=city;

citySelect.appendChild(option);

});

}catch(err){

console.error(err);
citySelect.innerHTML="<option>Failed to load cities</option>";

}

}

stateSelect.addEventListener("change",()=>{

if(stateSelect.value){

loadCities(stateSelect.value);

}

});

// get user location
if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

userLat=pos.coords.latitude;
userLon=pos.coords.longitude;

console.log("Location:",userLat,userLon);

});

}

// button click
document.getElementById("find-btn").addEventListener("click",()=>{

const career=document.getElementById("career").value;
const state=stateSelect.value;
const city=citySelect.value;
const experience=document.getElementById("experience").value;

alert(
"Searching for:\n\n"+
"Career: "+career+"\n"+
"State: "+state+"\n"+
"City: "+city+"\n"+
"Experience: "+experience
);

});

</script>

</body>
</html>
